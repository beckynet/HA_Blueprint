blueprint:
  name: SonOff SNZP Z2M V2
  description: '## Control Action with SonOff SNZP-01P (https://www.zigbee2mqtt.io/devices/SNZB-01P.html)
    (v2.0)


    Only for use with Zigbee2MQTT (cf [MQTT](https://www.home-assistant.io/integrations/mqtt)
    + [Z2M addon](https://github.com/zigbee2mqtt/hassio-zigbee2mqtt#installation)).


    Available controls per button:

    - Press Single

    - Press Double

    - Press and Long

    '
  domain: automation
  author: Beckynet
  homeassistant:
    min_version: 2024.10.0

  input:
    z2m_base_topic:
      name: Zigbee2MQTT Base Topic
      description: 'Zigbee2MQTT Base Topic, take a look in your Z2M configuration under Setting / MQTT / Base Topic
        
        Note:
        
          - These values are case sensitive.
          
          - Respect lower and upper case letters
          
        Sample : zigbee2mqtt/device name/action.'
      default: zigbee2mqtt
      selector:
        text: {}
    action_1_single:
      name: Action for 1_single
      default: []
      selector:
        action: {}
    action_1_double:
      name: Action for 1_double
      default: []
      selector:
        action: {}
    action_1_long:
      name: Action for 1_long
      default: []
      selector:
        action: {}

trigger_variables:
  z2m_base_topic: !input z2m_base_topic

triggers:
- trigger: mqtt
  topic: !input z2m_base_topic

conditions: []

actions:
- choose:
  - conditions:
    - condition: template
      value_template: '{{ trigger.payload == ''single'' }}'
    sequence: !input action_1_single
  - conditions:
    - condition: template
      value_template: '{{ trigger.payload == ''double'' }}'
    sequence: !input action_1_double
  - conditions:
    - condition: template
      value_template: '{{ trigger.payload == ''long'' }}'
    sequence: !input action_1_long
mode: single