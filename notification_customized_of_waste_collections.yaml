blueprint:
  name: Notification Customized of Waste collections
  description: >
    ## Notification Customized of Waste collections (v2.1)

    Only for use with (cf https://github.com/olibos/HomeAssistant-RecycleApp/)

    ***Available controls:***
    - Selection of the type of residue collection to be followed
    - Choice of announcement time
    - Telegram notification option (Markdown V2)
    - Alexa Device(s) notification option
    - Media Player TTS option with adjustable default volume
  domain: automation
  author: Beckynet (modifié)
  homeassistant:
    min_version: 2024.10.0

  input:
    collect_list:
      name: List Of Collect
      description: List of collect you want to follow
      default: []
      selector:
        entity:
          domain:
            - sensor
          integration: recycle_app
          multiple: true
          reorder: false

    trigger_time:
      name: Trigger time
      description: Select the trigger time
      selector:
        time: {}

    telegram_settings:
      name: Send Notification To Telegram (Optional)
      icon: phu:telegram
      collapsed: false
      input:
        enable_telegram:
          name: Enable Telegram Notification
          default: false
          selector:
            boolean: {}

        target_telegram:
          name: Telegram Group
          description: Select Telegram Chat Target
          default: []
          selector:
            entity:
              domain:
                - notify
              integration: telegram_bot
              multiple: true
              reorder: false

    alexa_device_settings:
      name: Announce on Alexa Device (Optional)
      icon: phu:alexa-logo
      collapsed: true
      input:
        enable_alexa:
          name: Enable Alexa Notification
          default: false
          selector:
            boolean: {}

        target_alexa:
          name: Alexa Devices
          description: Alexa Devices
          default: []
          selector:
            entity:
              domain:
                - notify
              integration: alexa_devices
              multiple: true
              reorder: false

    media_player_settings:
      name: TTS on Media Player (Optional)
      icon: mdi:speaker-message
      collapsed: true
      input:
        enable_media_player:
          name: Enable Media Player Notification
          default: false
          selector:
            boolean: {}

        default_volume_level:
          name: Default TTS Volume
          default: 0.50
          selector:
            number:
              min: 0
              max: 1
              step: 0.05
              mode: slider

        target_tts:
          name: TTS engine
          description: TTS Engine
          default: []
          selector:
            entity:
              domain:
                - tts
              multiple: false
              reorder: false

        target_media_players:
          name: Media Players
          description: Media players for TTS
          default: []
          selector:
            entity:
              domain:
                - media_player
              multiple: true
              reorder: false

variables:
  list_collect: !input collect_list
  enable_telegram: !input enable_telegram
  enable_alexa: !input enable_alexa
  enable_media_player: !input enable_media_player
  list_target_telegram: !input target_telegram
  list_target_alexa: !input target_alexa

  mp_targets: !input target_media_players
  mp_tts: !input target_tts
  mp_volume: !input default_volume_level

triggers:
  - trigger: time
    at: !input trigger_time

conditions:
  - condition: template
    value_template: >
      {% set tomorrow_pickups = namespace(entities=[]) %}
      {% set pickup_day = namespace(state = false) %}
      {% set collect_types = list_collect %}
      {% for collect_type in collect_types %}
        {% if state_attr(collect_type, 'days') == 1 %}
        {% set pickup_day.state = true %}
        {% set tomorrow_pickups.entities = tomorrow_pickups.entities + [state_attr(collect_type, 'friendly_name')] %}
        {% endif %}
      {% endfor %}
      {{ pickup_day.state }}

actions:
  - variables:
      announce_text: >-
        {% set tomorrow_pickups = namespace(entities=[]) %}
        {% set pickup_day = namespace(state = false) %}
        {% set collect_types = list_collect %}
        {% for collect_type in collect_types %}
          {% if state_attr(collect_type, 'days') == 1 %}
          {% set pickup_day.state = true %}
          {% set tomorrow_pickups.entities = tomorrow_pickups.entities + [state_attr(collect_type, 'type_of_collect')] %}
          {% endif %}
        {% endfor %}
        {% if pickup_day %}
          Demain collecte {{ tomorrow_pickups.entities | join(' et ') }}
        {% endif %}

  # --- TELEGRAM ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_telegram }}"
          - condition: template
            value_template: "{{ list_target_telegram | count > 0 }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: !input target_telegram
            data:
              title: "*📢 Ramassage des Ordures*"
              message: >
                {{ announce_text | regex_replace('([_*\\[\\]\\(\\)~`>#+\\-=|{}.!])','\\\\\\1') }}

  # --- ALEXA ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_alexa }}"
          - condition: template
            value_template: "{{ list_target_alexa | count > 0 }}"
        sequence:
          - action: notify.send_message
            target:
              entity_id: !input target_alexa
            data:
              message: "{{ announce_text }}"

  # --- MEDIA PLAYER TTS ---
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ enable_media_player }}"
          - condition: template
            value_template: "{{ mp_targets | count > 0 }}"
          - condition: template
            value_template: "{{ mp_tts != [] }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: !input target_media_players
            data:
              volume_level: "{{ mp_volume }}"

          - action: tts.speak
            target:
              entity_id: !input target_tts
            data:
              cache: true
              media_player_entity_id: !input target_media_players
              message: "{{ announce_text }}"

mode: single
