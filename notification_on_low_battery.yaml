blueprint:
  name: Notification On Low Battery
  description: 'Regularly checks all battery sensors and triggers an action if their
    battery level is below a configurable threshold.
    Batteries to exclude can be configured, as well as the day and time of the check.
    The list of low battery devices is available in the {{ batteries }} variable, and
    the list of devices with unavailable battery level is available in the {{ batteries_indisponibles }} variable.
    '

  domain: automation
  author: Beckynet
  homeassistant:
    min_version: 2024.10.0

  input:
    threshold:
      name: Battery threshold (%)
      description: Devices with battery below this percentage will be reported.
      default: 40
      selector:
        number:
          min: 1.0
          max: 100.0
          unit_of_measurement: '%'
          mode: slider
          step: 1.0
    time:
      name: Time to test
      description: Time of day when the test should run.
      default: '10:00:00'
      selector:
        time: {}
    day:
      name: Weekday to test
      description: 'Run every day (0) or only on a specific weekday (1=Mon ... 7=Sun)

        '
      default: 0
      selector:
        number:
          min: 0.0
          max: 7.0
          mode: slider
          step: 1.0
    exclude:
      name: Excluded battery sensors
      description: Sélectionnez uniquement des capteurs de batterie à exclure.
      default: []
      selector:
        entity:
          domain:
          - sensor
          device_class:
          - battery
          multiple: true
          reorder: false
    target_telegram:
      name: Telegram Group
      description: Select Telegram Chat Traget (Optional)
      default: []
      selector:
        entity:
          domain:
          - notify
          integration: telegram_bot
          multiple: true
          reorder: false
    actions:
      name: Actions
      description: Actions to run when low-battery devices are detected. {{ batteries
        }} will contain the list of devices.
      default: []
      selector:
        action: {}

  source_url: https://github.com/beckynet/HA_Blueprint/blob/main/notification_on_low_battery.yaml

variables:
  threshold: !input threshold
  day: !input day
  exclude: !input exclude
  list_target_telegram: !input target_telegram
  batteries: "{% set result = namespace(list=[]) %} {% for state in states.sensor\n
    \   | selectattr('attributes.device_class', 'defined')\n    | selectattr('attributes.device_class',
    '==', 'battery') %}\n  {% if state.entity_id not in exclude %}\n    {% set level
    = state.state | int(default=999) %}\n    {% if level != 999 and level <= threshold
    %}\n      {% set result.list = result.list + [ state.name ~ \" (\" ~ level ~ \"%)\"
    ] %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ result.list | join(', ')
    }}\n"
  batteries_indisponibles: "{% set result = namespace(list=[]) %} {% for state in
    states.sensor\n    | selectattr('attributes.device_class', 'defined')\n    | selectattr('attributes.device_class',
    '==', 'battery') %}\n  {% if state.entity_id not in exclude %}\n    {% if state.state
    in ['unknown', 'unavailable', 'None'] %}\n      {% set result.list = result.list
    + [ state.name ] %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ result.list
    | join(', ') }}\n"

triggers:
- trigger: time
  at: !input time

conditions:
- '{{ batteries != '''' and (day | int == 0 or day | int == now().isoweekday()) }}'

actions:
- action: notify.send_message
  target:
    entity_id: !input target_telegram
  data:
    title: "*\U0001FAABBatteries*"
    message: "_*Batteries faibles:*_\n {{ batteries | replace('_','\\_') | replace('(','\\(')
      | replace(')','\\)') | replace('*','\\*') | replace('-','\\-') | replace('.','\\.')
      }} \n_*Batteries vides:*_\n {{ batteries_indisponibles | replace('_','\\_')
      | replace('(','\\(') | replace(')','\\)') | replace('*','\\*') | replace('-','\\-')
      | replace('.','\\.') }}"
- choose: []
  default: !input actions

mode: single
