blueprint:
  name: Alerte batterie Tado + LED
  description: Alerte batterie faible avec notification et LED Zigbee
  domain: automation
  input:
    battery_sensor:
      name: Capteur de batterie
      selector:
        entity:
          domain: sensor
    led_entity:
      name: LED Zigbee ou autre entité visuelle
      selector:
        entity:
          domain: light
    notify_target:
      name: Cible de notification
      selector:
        target:
          entity:
            domain: notify
    seuil:
      name: Seuil de batterie (%)
      default: 20
      selector:
        number:
          min: 5
          max: 50
          unit_of_measurement: '%'

trigger:
  - platform: numeric_state
    entity_id: !input battery_sensor
    below: !input seuil

condition:
  - condition: template
    value_template: >
      {{ states(!input.battery_sensor) | int > 0 }}

action:
  - service: light.turn_on
    target:
      entity_id: !input led_entity
    data:
      color_name: red
      brightness: 255
  - service: !input.notify_target
    data:
      message: >
        ⚠️ Batterie faible détectée sur {{ state_attr(!input.battery_sensor, 'friendly_name') }} ({{ states(!input.battery_sensor) }}%)
mode: single